<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#134e4a" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- decorative circles -->
  <circle cx="900" cy="120" r="220" fill="white" fill-opacity="0.05" filter="url(#blur)"/>
  <circle cx="200" cy="500" r="180" fill="white" fill-opacity="0.05" filter="url(#blur)"/>
  <!-- emoji -->
  <text x="600" y="290" font-size="120" text-anchor="middle" dominant-baseline="middle">💡</text>
  <!-- label -->
  <text x="600" y="420" font-family="sans-serif" font-size="96" font-weight="bold"
        text-anchor="middle" fill="white" opacity="0.95">想法</text>
</svg>